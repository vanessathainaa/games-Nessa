<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cyber Breakout 🧱</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0a14; color: white; text-align: center; }
        .navbar { background-color: #161224; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #7b2cbf; }
        .navbar a { color: #e0aaff; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        .score-box { background-color: #3c096c; padding: 0.4rem 1.2rem; border-radius: 20px; border: 1px solid #7b2cbf; font-weight: bold; color: #fff; text-shadow: 0 0 5px #ff007f; }
        h2 { margin: 1.5rem 0 0.5rem; color: #e0aaff; text-shadow: 0 0 10px #7b2cbf; font-size: 2.2rem; }
        p { margin-bottom: 1rem; color: #b3a7d4; }
        
        .container { position: relative; width: 480px; height: 400px; margin: 0 auto; }
        canvas { background: #090612; border: 4px solid #7b2cbf; border-radius: 12px; box-shadow: 0 0 25px rgba(123, 44, 191, 0.5); }
        .controls-info { font-size: 0.85rem; color: #8a7fa6; margin-top: 5px; }

        .game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 10, 20, 0.9); border-radius: 12px; flex-direction: column; align-items: center; justify-content: center; }
        .game-over-screen h3 { color: #ff007f; font-size: 24px; margin-bottom: 10px; text-shadow: 0 0 10px #ff007f; }
        .game-over-screen p { color: #fff; font-size: 18px; margin-bottom: 20px; }
        .retry-btn { background: linear-gradient(90deg, #7b2cbf, #b5179e); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .retry-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(181, 23, 158, 0.6); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/">⬅ Sair do Sistema</a>
        <div class="score-box">PONTOS: <span id="score">0</span></div>
    </nav>

    <h2>Cyber Breakout</h2>
    <p>Destrua todos os blocos de dados sem deixar a esfera cair.</p>

    <div class="container">
        <canvas id="breakoutCanvas" width="480" height="400"></canvas>
        <div class="game-over-screen" id="gameOverScreen">
            <h3 id="gameOverTitle">SISTEMA BLOQUEADO</h3>
            <p>Pontuação Final: <span id="finalScore">0</span></p>
            <button class="retry-btn" onclick="restartGame()">Tentar Novamente</button>
        </div>
    </div>
    <div class="controls-info">Controles: Setas Esquerda/Direita para mover a plataforma</div>

    <script>
        const canvas = document.getElementById("breakoutCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let gameActive = true;
        let ball = { x: canvas.width / 2, y: canvas.height - 30, dx: 3, dy: -3, radius: 7 };
        const paddle = { height: 12, width: 85, x: (canvas.width - 85) / 2, speed: 6 };

        const brickRowCount = 4; const brickColumnCount = 6;
        const brickWidth = 65; const brickHeight = 18; const brickPadding = 8;
        const brickOffsetTop = 40; const brickOffsetLeft = 24;

        let bricks = [];
        function initBricks() {
            for (let c = 0; c < brickColumnCount; c++) {
                bricks[c] = [];
                for (let r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        let rightPressed = false; let leftPressed = false;
        document.addEventListener("keydown", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
            if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
        });
        document.addEventListener("keyup", (e) => {
            if (e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
            if (e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
        });

        function collisionDetection() {
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    let b = bricks[c][r];
                    if (b.status === 1) {
                        if (ball.x > b.x && ball.x < b.x + brickWidth && ball.y > b.y && ball.y < b.y + brickHeight) {
                            ball.dy = -ball.dy;
                            b.status = 0;
                            score += 15;
                            document.getElementById("score").innerText = score;
                            if (score === brickRowCount * brickColumnCount * 15) endGame(true);
                        }
                    }
                }
            }
        }

        function update() {
            if (!gameActive) return;
            collisionDetection();

            if (rightPressed && paddle.x < canvas.width - paddle.width) paddle.x += paddle.speed;
            if (leftPressed && paddle.x > 0) paddle.x -= paddle.speed;

            if (ball.x + ball.dx > canvas.width - ball.radius || ball.x + ball.dx < ball.radius) ball.dx = -ball.dx;
            if (ball.y + ball.dy < ball.radius) ball.dy = -ball.dy;
            else if (ball.y + ball.dy > canvas.height - ball.radius - paddle.height) {
                if (ball.x > paddle.x && ball.x < paddle.x + paddle.width) {
                    ball.dy = -ball.dy;
                } else if (ball.y + ball.dy > canvas.height - ball.radius) {
                    endGame(false);
                }
            }
            ball.x += ball.dx; ball.y += ball.dy;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const colors = ["#ff007f", "#b5179e", "#9d4ede", "#7b2cbf"];
            
            for (let c = 0; c < brickColumnCount; c++) {
                for (let r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        let brickX = c * (brickWidth + brickPadding) + brickOffsetLeft;
                        let brickY = r * (brickHeight + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX; bricks[c][r].y = brickY;
                        ctx.fillStyle = colors[r];
                        ctx.fillRect(brickX, brickY, brickWidth, brickHeight);
                    }
                }
            }

            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ff007f";
            ctx.fill();
            ctx.closePath();

            ctx.fillStyle = "#e0aaff";
            ctx.fillRect(paddle.x, canvas.height - paddle.height, paddle.width, paddle.height);
        }

        function endGame(isWin) {
            gameActive = false;
            document.getElementById("gameOverTitle").innerText = isWin ? "SISTEMA DESCRIPTOGRAFADO" : "CONEXÃO INTERROMPIDA";
            document.getElementById("gameOverTitle").style.color = isWin ? "#00ffcc" : "#ff007f";
            document.getElementById("finalScore").innerText = score;
            document.getElementById("gameOverScreen").style.display = "flex";
        }

        function restartGame() {
            score = 0;
            ball = { x: canvas.width / 2, y: canvas.height - 30, dx: 3, dy: -3, radius: 7 };
            paddle.x = (canvas.width - 85) / 2;
            document.getElementById("score").innerText = score;
            document.getElementById("gameOverScreen").style.display = "none";
            initBricks();
            gameActive = true;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initBricks();
        gameLoop();
    </script>
</body>
</html>
