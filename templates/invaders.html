<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cyber Space Invaders 🛸</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0d0a14; color: white; text-align: center; }
        .navbar { background-color: #161224; padding: 1.2rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #7b2cbf; }
        .navbar a { color: #e0aaff; text-decoration: none; font-weight: bold; font-size: 1.1rem; }
        .score-box { background-color: #3c096c; padding: 0.4rem 1.2rem; border-radius: 20px; border: 1px solid #7b2cbf; font-weight: bold; color: #fff; text-shadow: 0 0 5px #ff007f; }
        h2 { margin: 1.5rem 0 0.5rem; color: #e0aaff; text-shadow: 0 0 10px #7b2cbf; font-size: 2.2rem; }
        p { margin-bottom: 1rem; color: #b3a7d4; }
        
        .container { position: relative; width: 480px; height: 400px; margin: 0 auto; }
        canvas { background: #090612; border: 4px solid #7b2cbf; border-radius: 12px; box-shadow: 0 0 25px rgba(123, 44, 191, 0.5); }
        .controls-info { font-size: 0.85rem; color: #8a7fa6; margin-top: 5px; }

        .game-over-screen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13, 10, 20, 0.9); border-radius: 12px; flex-direction: column; align-items: center; justify-content: center; }
        .game-over-screen h3 { color: #ff007f; font-size: 24px; margin-bottom: 10px; text-shadow: 0 0 10px #ff007f; }
        .game-over-screen p { color: #fff; font-size: 18px; margin-bottom: 20px; }
        .retry-btn { background: linear-gradient(90deg, #7b2cbf, #b5179e); color: white; border: none; padding: 0.6rem 1.5rem; border-radius: 8px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .retry-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(181, 23, 158, 0.6); }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="/">⬅ Sair da Órbita</a>
        <div class="score-box">PONTOS: <span id="score">0</span></div>
    </nav>

    <h2>Space Invaders</h2>
    <p>Elimine todos os alienígenas.</p>

    <div class="container">
        <canvas id="spaceCanvas" width="480" height="400"></canvas>
        <div class="game-over-screen" id="gameOverScreen">
            <h3>CONEXÃO INTERROMPIDA</h3>
            <p>Pontuação Final: <span id="finalScore">0</span></p>
            <button class="retry-btn" onclick="restartGame()">Tentar Novamente</button>
        </div>
    </div>
    <div class="controls-info">Controles: Setas Esquerda/Direita | Barra de Espaço para Atirar</div>

    <script>
        const canvas = document.getElementById("spaceCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let gameActive = true;
        let player = { x: canvas.width / 2 - 15, y: canvas.height - 35, width: 30, height: 20, speed: 5 };
        let bullets = [];
        let enemies = [];
        const enemyRows = 3; const enemyCols = 6; const enemyWidth = 35; const enemyHeight = 20;
        let enemyDirection = 1; let enemySpeed = 1;

        function initEnemies() {
            enemies = [];
            for (let r = 0; r < enemyRows; r++) {
                for (let c = 0; c < enemyCols; c++) {
                    enemies.push({ x: c * (enemyWidth + 20) + 50, y: r * (enemyHeight + 15) + 40, width: enemyWidth, height: enemyHeight, active: true });
                }
            }
        }

        let keys = {};
        document.addEventListener("keydown", (e) => {
            keys[e.code] = true;
            if (e.code === "Space" && gameActive) {
                bullets.push({ x: player.x + player.width / 2 - 2, y: player.y, width: 4, height: 10, speed: 6 });
            }
        });
        document.addEventListener("keyup", (e) => { keys[e.code] = false; });

        function update() {
            if (!gameActive) return;

            if (keys["ArrowLeft"]) player.x -= player.speed;
            if (keys["ArrowRight"]) player.x += player.speed;
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            bullets.forEach((bullet, index) => {
                bullet.y -= bullet.speed;
                if (bullet.y < 0) bullets.splice(index, 1);
            });

            let changeDirection = false;
            enemies.forEach(enemy => {
                if (!enemy.active) return;
                enemy.x += enemySpeed * enemyDirection;
                if (enemy.x + enemy.width > canvas.width || enemy.x < 0) changeDirection = true;
                if (enemy.y + enemy.height >= player.y) endGame();
            });

            if (changeDirection) {
                enemyDirection *= -1;
                enemies.forEach(enemy => { enemy.y += 15; });
            }

            bullets.forEach((bullet, bIndex) => {
                enemies.forEach((enemy) => {
                    if (!enemy.active) return;
                    if (bullet.x < enemy.x + enemy.width && bullet.x + bullet.width > enemy.x && bullet.y < enemy.y + enemy.height && bullet.y + bullet.height > enemy.y) {
                        enemy.active = false;
                        bullets.splice(bIndex, 1);
                        score += 20;
                        document.getElementById("score").innerText = score;
                    }
                });
            });

            if (enemies.every(e => !e.active)) { enemySpeed += 0.5; initEnemies(); }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#e0aaff";
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = "#ff007f";
            bullets.forEach(bullet => { ctx.fillRect(bullet.x, bullet.y, bullet.width, bullet.height); });

            ctx.fillStyle = "#9d4ede";
            enemies.forEach(enemy => { if (enemy.active) ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height); });
        }

        function endGame() {
            gameActive = false;
            document.getElementById("finalScore").innerText = score;
            document.getElementById("gameOverScreen").style.display = "flex";
        }

        function restartGame() {
            score = 0;
            enemySpeed = 1;
            enemyDirection = 1;
            player.x = canvas.width / 2 - 15;
            bullets = [];
            document.getElementById("score").innerText = score;
            document.getElementById("gameOverScreen").style.display = "none";
            initEnemies();
            gameActive = true;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        initEnemies();
        gameLoop();
    </script>
</body>
</html>
